# Copy to application-local.yaml and adjust credentials.
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/escrow_flow
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: replace-with-a-long-random-secret-at-least-32-characters
    expiration-ms: 86400000
  wallet:
    starting-balance: 10000
