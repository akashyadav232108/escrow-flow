spring:
  application:
    name: escrow-flow
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  jwt:
    secret: change-me-use-a-long-random-secret-at-least-32-characters
    expiration-ms: 86400000
  wallet:
    starting-balance: 10000

logging:
  level:
    root: INFO
    com.escrowflow: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
